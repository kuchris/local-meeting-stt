  <text x="382" y="354" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="15">Live + WAV</text>
  <rect x="274" y="380" width="292" height="38" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="390" y="404" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="15">Live Text</text>
  <rect x="274" y="430" width="292" height="38" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="393" y="454" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="15">CPP GPU</text>
  <rect x="274" y="480" width="292" height="38" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="395" y="504" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="15">CPP CPU</text>
  <rect x="274" y="542" width="292" height="38" rx="6" fill="#fff7f7" stroke="#f4c7c3"/>
  <text x="360" y="566" fill="#b42318" font-family="Segoe UI, Arial, sans-serif" font-size="15">Stop active process</text>

  <rect x="606" y="186" width="634" height="248" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="606" y="186" width="634" height="48" rx="10" fill="#f8f9fa"/>
  <line x1="606" y1="234" x2="1240" y2="234" stroke="#e5e7eb"/>
  <text x="622" y="216" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Live transcript</text>
  <text x="626" y="272" fill="#111111" font-family="Cascadia Mono, Consolas, monospace" font-size="15">[10:45:21] はじめまして 音声大丈夫でしょうか</text>
  <text x="626" y="304" fill="#111111" font-family="Cascadia Mono, Consolas, monospace" font-size="15">[10:45:33] 大丈夫ですよ。よろしくお願いいたします。</text>

  <rect x="606" y="452" width="634" height="216" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="606" y="452" width="634" height="48" rx="10" fill="#f8f9fa"/>
  <line x1="606" y1="500" x2="1240" y2="500" stroke="#e5e7eb"/>
  <text x="622" y="482" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Process log</text>
  <rect x="1170" y="464" width="54" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="1185" y="483" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="13">Clear</text>
  <text x="626" y="536" fill="#6b7280" font-family="Cascadia Mono, Consolas, monospace" font-size="14">Model: models\faster-whisper-small</text>
  <text x="626" y="564" fill="#6b7280" font-family="Cascadia Mono, Consolas, monospace" font-size="14">System loopback: Speakers (INZONE Buds - Game)</text>
</svg>
