  <text x="82" y="103" fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="13">Local control panel</text>
  <line x1="28" y1="124" x2="220" y2="124" stroke="#e5e7eb"/>
  <rect x="28" y="142" width="192" height="38" rx="6" fill="#111111"/>
  <text x="42" y="166" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="15">Live</text>
  <rect x="28" y="190" width="192" height="38" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="42" y="214" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="15">Record</text>
  <rect x="28" y="238" width="192" height="38" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="42" y="262" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="15">Transcribe</text>
  <rect x="28" y="286" width="192" height="38" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="42" y="310" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="15">Setup</text>
  <rect x="28" y="642" width="192" height="34" rx="17" fill="#ffffff" stroke="#e5e7eb"/>
  <circle cx="86" cy="659" r="4" fill="#9ca3af"/>
  <text x="102" y="664" fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">Idle</text>

  <rect x="250" y="52" width="990" height="118" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="274" y="88" fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">LIVE</text>
  <text x="274" y="122" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Live Meeting</text>
  <text x="274" y="146" fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="14">Start a recorder and keep the rough transcript visible while logs stream beside it.</text>

  <rect x="250" y="186" width="340" height="482" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="274" y="222" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Engine</text>
  <text x="274" y="258" fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">Chunk seconds</text>
  <rect x="274" y="270" width="292" height="38" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="290" y="294" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="16">3</text>
