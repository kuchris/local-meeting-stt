<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Local Meeting STT app preview</title>
  <desc id="desc">A compact desktop control panel for local meeting recording and speech-to-text.</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="0" y="0" width="1280" height="36" fill="#111111"/>
  <rect x="10" y="8" width="22" height="22" rx="5" fill="#111111" stroke="#3f3f46"/>
  <text x="42" y="23" fill="#f8f9fa" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Local Meeting STT</text>
  <text x="176" y="23" fill="#d1d5db" font-family="Segoe UI, Arial, sans-serif" font-size="12">File</text>
  <text x="216" y="23" fill="#d1d5db" font-family="Segoe UI, Arial, sans-serif" font-size="12">Run</text>
  <text x="256" y="23" fill="#d1d5db" font-family="Segoe UI, Arial, sans-serif" font-size="12">View</text>
  <text x="310" y="23" fill="#d1d5db" font-family="Segoe UI, Arial, sans-serif" font-size="12">Window</text>
  <text x="380" y="23" fill="#d1d5db" font-family="Segoe UI, Arial, sans-serif" font-size="12">Help</text>

  <rect x="14" y="52" width="220" height="640" rx="10" fill="#f8f9fa" stroke="#e5e7eb"/>
